# create github actions workflow for a car price prediction project
name: Car Price Prediction CI/CD
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.8'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          pytest tests/

      - name: Build Docker image
        run: |
          docker build -t car-price-prediction .

      - name: Push Docker image to Docker Hub
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          echo $DOCKER_PASSWORD | docker login -u $DOCKER_USERNAME --password-stdin
          docker tag car-price-prediction $DOCKER_USERNAME/car-price-prediction:latest
          docker push $DOCKER_USERNAME/car-price-prediction:latest
      - name: Deploy to Heroku
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
        run: |
          heroku container:login  
          heroku container:push web --app your-heroku-app-name
          heroku container:release web --app your-heroku-app-name

      - name: Notify Deployment Success
        if: success()
        run: echo "Deployment succeeded!"
      - name: Notify Deployment Failure
        if: failure()
        run: echo "Deployment failed!"

          